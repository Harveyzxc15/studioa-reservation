name: Daily Report (9 AM)

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 09:00 台灣時間（UTC+8 → UTC 01:00）
  workflow_dispatch:        # 允許手動觸發

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允許 commit state 回 repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          STUDIOA_TOKEN:    ${{ secrets.STUDIOA_TOKEN }}
          DISCORD_WEBHOOK:  ${{ secrets.DISCORD_WEBHOOK }}
        run: python report.py

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update history $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
