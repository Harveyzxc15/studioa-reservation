name: Alert N2 (Every 8h)

on:
  schedule:
    - cron: '10 */8 * * *'  # 每 8 小時，與北一區錯開10分鐘
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert check (北二區)
        env:
          STUDIOA_TOKEN:       ${{ secrets.STUDIOA_TOKEN }}
          DISCORD_WEBHOOK_N2:  ${{ secrets.DISCORD_WEBHOOK_N2 }}
        run: python alert.py --region n2

      - name: Commit updated alert state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: n2 alert state $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
