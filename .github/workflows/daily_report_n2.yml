name: Daily Report N2 (9 AM)

on:
  schedule:
    - cron: '5 1 * * *'   # 每天 09:05 台灣時間（與北一區錯開5分鐘）
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report (北二區)
        env:
          STUDIOA_TOKEN:       ${{ secrets.STUDIOA_TOKEN }}
          DISCORD_WEBHOOK_N2:  ${{ secrets.DISCORD_WEBHOOK_N2 }}
        run: python report.py --region n2

      - name: Commit updated state & HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ docs/
          git diff --cached --quiet || git commit -m "chore: n2 daily report $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
